<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClockSimulator.com - Minimalist & Distraction-Free Analog Clock</title>
  <meta name="description" content="A clean, fullscreen analog clock simulator. No ads, no tracking, just a beautiful clock.">
  <meta name="keywords" content="clock simulator, analog clock, online clock, distraction-free clock, fullscreen clock, no ads clock">
  <link rel="canonical" href="https://www.clocksimulator.com/">
  <meta property="og:title" content="ClockSimulator.com - Minimalist & Distraction-Free Analog Clock">
  <meta property="og:description" content="Minimalist analog clock. Distraction-free, open source, and privacy-focused.">
  <meta property="og:url" content="https://www.clocksimulator.com/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="clocksimulator.com">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ClockSimulator.com - Minimalist & Distraction-Free Analog Clock">
  <meta name="twitter:description" content="A clean, fullscreen analog clock simulator. View the current time with rendered clock.">
  <meta name="version" content="1.0.8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#000000">
  <link rel="icon" id="favicon" type="image/png">
  <style>
    :root {
      --bg: #000000;
      --clock-face: #0a0a0a;
      --clock-border: #f5f5f5;
      --tick: #d4d4d4;
      --number: #fafafa;
      --hour-hand: #fafafa;
      --minute-hand: #d4d4d4;
      --second-hand: #ef4444;
      --center-dot: #ef4444;
      --toggle-bg: #262626;
      --toggle-knob: #e5e5e5;
    }

    body.light-mode {
      --bg: #f0f0f0;
      --clock-face: #ffffff;
      --clock-border: #333333;
      --tick: #333333;
      --number: #222222;
      --hour-hand: #222222;
      --minute-hand: #444444;
      --second-hand: #d63031;
      --center-dot: #d63031;
      --toggle-bg: #bbb;
      --toggle-knob: #fff;
    }

    body.transparent-mode {
      --bg: transparent;
      --clock-face: transparent;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      height: var(--app-height, 100dvh);
      width: 100vw;
      overflow: hidden;
      transition: background 0.4s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    body.cursor-hidden {
      cursor: none;
    }

    .toggle-wrapper {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .toggle-wrapper.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .toggle-label {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle-label input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--toggle-bg);
      border-radius: 22px;
      transition: background 0.3s ease;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    .toggle-label input:checked ~ .toggle-slider::before {
      transform: translateX(18px);
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      width: auto;
      padding-left: 24px;
      position: relative;
    }

    .theme-toggle .toggle-slider {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .theme-icon {
      width: 18px;
      height: 18px;
      color: var(--tick);
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      transition: opacity 0.3s ease;
    }

    .theme-icon-moon {
      opacity: 1;
    }

    .theme-icon-sun {
      opacity: 0;
    }

    .theme-toggle input:checked ~ .theme-icon-moon {
      opacity: 0;
    }

    .theme-toggle input:checked ~ .theme-icon-sun {
      opacity: 1;
    }

    .wake-lock-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      width: auto;
    }

    .wake-lock-toggle .toggle-slider {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .wake-lock-icon {
      width: 18px;
      height: 18px;
      color: var(--tick);
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .wake-lock-toggle input:checked ~ .wake-lock-icon {
      opacity: 1;
    }

    .second-mode-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      width: auto;
    }

    .second-mode-toggle .toggle-slider {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .second-mode-icon {
      width: 18px;
      height: 18px;
      color: var(--tick);
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .second-mode-toggle input:checked ~ .second-mode-icon {
      opacity: 1;
    }

    .toggle-label[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      top: calc(100% + 6px);
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.9);
      color: #eee;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease 0.15s;
    }

    body.light-mode .toggle-label[data-tooltip]::after {
      background: rgba(50, 50, 50, 0.9);
      color: #fff;
    }

    .toggle-label[data-tooltip]:hover::after {
      opacity: 1;
    }

    .about-btn {
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--tick);
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0.5;
      transition: opacity 0.2s ease;
    }

    .about-btn:hover {
      opacity: 1;
    }

    .about-btn svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .about-bubble {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: rgba(30, 30, 30, 0.92);
      color: #eee;
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .about-bubble.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .about-bubble {
      -webkit-user-select: text;
      user-select: text;
    }

    body.light-mode .about-bubble {
      background: rgba(50, 50, 50, 0.92);
      color: #fff;
    }

    .about-bubble a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(255, 255, 255, 0.35);
      text-underline-offset: 2px;
    }

    .about-bubble a:hover {
      text-decoration-color: rgba(255, 255, 255, 0.7);
    }

    @keyframes embed-flash {
      0%   { background: rgba(255,255,255,0.25); }
      100% { background: transparent; }
    }
    #embedLink.flash {
      animation: embed-flash 0.8s ease-out;
      border-radius: 3px;
    }

    .clock-container {
      width: 90vmin;
      height: 90vmin;
      transition: transform 10s ease-in-out;
    }

    .clock-container svg {
      width: 100%;
      height: 100%;
    }

    body.embed-mode .toggle-wrapper {
      display: none !important;
    }

    body.embed-mode .clock-container {
      width: 100vmin;
      height: 100vmin;
      transition: none;
    }

    .embed-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .embed-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .embed-panel {
      background: #1a1a1a;
      color: #eee;
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 520px;
      width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
      -webkit-user-select: text;
      user-select: text;
    }

    body.light-mode .embed-panel {
      background: #f5f5f5;
      color: #222;
    }

    .embed-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .embed-panel-title {
      font-size: 15px;
      font-weight: 600;
    }

    .embed-close-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: inherit;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      padding: 0;
    }

    .embed-close-btn:hover {
      opacity: 1;
    }

    .embed-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-bottom: 16px;
    }

    .embed-field label {
      display: block;
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .embed-field input,
    .embed-field select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid rgba(128, 128, 128, 0.3);
      border-radius: 6px;
      background: rgba(128, 128, 128, 0.1);
      color: inherit;
      font-size: 13px;
      font-family: inherit;
    }

    .embed-field input:focus,
    .embed-field select:focus {
      outline: none;
      border-color: rgba(128, 128, 128, 0.6);
    }

    .embed-field select option {
      background: #1a1a1a;
      color: #eee;
    }

    body.light-mode .embed-field select option {
      background: #f5f5f5;
      color: #222;
    }

    .embed-preview-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      padding: 16px;
      background: rgba(128, 128, 128, 0.08);
      border-radius: 8px;
    }

    .embed-preview-wrap iframe {
      border: none;
    }

    .embed-code-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .embed-code {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(128, 128, 128, 0.3);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.2);
      color: inherit;
      font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      line-height: 1.5;
      resize: vertical;
      min-height: 60px;
    }

    body.light-mode .embed-code {
      background: rgba(0, 0, 0, 0.05);
    }

    .embed-copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    .embed-copy-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="toggle-wrapper">
    <label class="toggle-label theme-toggle" aria-label="Toggle light mode" data-tooltip="Toggle light mode">
      <input type="checkbox" id="themeToggle">
      <svg class="theme-icon theme-icon-moon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 11.5A7.5 7.5 0 0 1 8.5 3a7.65 7.65 0 0 1 .2-1.5A8 8 0 1 0 18.5 11.3a7.65 7.65 0 0 1-1.5.2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

        <line x1="2" y1="10" x2="4" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4.34" y1="4.34" x2="5.76" y2="5.76" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

        <line x1="4.34" y1="15.66" x2="5.76" y2="14.24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

      </svg>
    </label>
    <button class="about-btn" id="aboutBtn" aria-label="About">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">

      <g id="numbers"></g>

        <line x1="93.5" y1="52" x2="95" y2="52" stroke="var(--number)" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
        <line x1="105" y1="52" x2="106.5" y2="52" stroke="var(--number)" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
        <line x1="95.4" y1="47.4" x2="96.4" y2="48.4" stroke="var(--number)" stroke-width="1" stroke-linecap="round" opacity="0.55"/>

      </g>
      <g id="moonIcon" display="none">
        <path d="M103.5 48.5a5 5 0 1 1-4.5 8 4 4 0 0 0 4.5-8Z" fill="var(--number)" opacity="0.55"/>

      <path id="hourHand" d="M97.25,100 L97.25,55 L100,50 L102.75,55 L102.75,100 Z"
            fill="var(--hour-hand)" stroke="var(--hour-hand)" stroke-width="0.8" stroke-linejoin="round"/>

      <circle cx="100" cy="100" r="3.5" fill="var(--center-dot)"/>

  </div>

  <div class="embed-overlay" id="embedOverlay">
    <div class="embed-panel">
      <div class="embed-panel-header">
        <span class="embed-panel-title">Embed this clock</span>
        <button class="embed-close-btn" id="embedCloseBtn" aria-label="Close">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <line x1="5" y1="5" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="15" y1="5" x2="5" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="embed-controls">
        <div class="embed-field">
          <label for="embedTz">Timezone</label>
          <input type="text" id="embedTz" placeholder="e.g. Europe/Helsinki">
        </div>
        <div class="embed-field">
          <label for="embedTheme">Theme</label>
          <select id="embedTheme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="transparent">Transparent</option>
          </select>
        </div>
        <div class="embed-field">
          <label for="embedSeconds">Second hand</label>
          <select id="embedSeconds">
            <option value="tick">Tick</option>
            <option value="smooth">Smooth</option>
            <option value="hide">Hidden</option>
          </select>
        </div>
        <div class="embed-field">
          <label for="embedBorder">Clock border</label>
          <select id="embedBorder">
            <option value="show">Show</option>
            <option value="hide">Hide</option>
          </select>
        </div>
        <div class="embed-field">
          <label for="embedShape">Shape</label>
          <select id="embedShape">
            <option value="round">Round</option>
            <option value="square">Square</option>
          </select>
        </div>
        <div class="embed-field">
          <label for="embedDayNight">Day/Night (requires tz)</label>
          <select id="embedDayNight">
            <option value="hide">Hide</option>
            <option value="show">Show</option>
          </select>
        </div>
        <div class="embed-field">
          <label for="embedNumbers">Numbers</label>
          <select id="embedNumbers">
            <option value="show">Show</option>
            <option value="hide">Hide</option>
          </select>
        </div>
        <div class="embed-field">
          <label for="embedWidth">Width (px)</label>
          <input type="number" id="embedWidth" value="200" min="50" max="1000">
        </div>
        <div class="embed-field">
          <label for="embedHeight">Height (px)</label>
          <input type="number" id="embedHeight" value="200" min="50" max="1000">
        </div>
      </div>
      <div class="embed-preview-wrap">
        <iframe id="embedPreview" width="120" height="120"></iframe>
      </div>
      <div class="embed-code-wrap">
        <textarea class="embed-code" id="embedCode" readonly rows="3"></textarea>
      </div>
      <button class="embed-copy-btn" id="embedCopyBtn">Copy code</button>
    </div>
  </div>

  <script>
    (function () {
      function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
      }
      window.addEventListener('resize', setAppHeight);
      setAppHeight();

      const ticksGroup = document.getElementById('ticks');
      const numbersGroup = document.getElementById('numbers');
      const hourHand = document.getElementById('hourHand');
      const minuteHand = document.getElementById('minuteHand');
      const secondHand = document.getElementById('secondHand');
      const themeToggle = document.getElementById('themeToggle');
      const sunIcon = document.getElementById('sunIcon');
      const moonIcon = document.getElementById('moonIcon');

      const CX = 100, CY = 100, R = 85;

      var params = new URLSearchParams(window.location.search);
      var tzParam = params.get('tz');
      var timezone = null;
      if (tzParam) {
        try {
          new Intl.DateTimeFormat(undefined, { timeZone: tzParam });
          timezone = tzParam;
        } catch (e) {}
      }

      var tzFormatter = timezone ? new Intl.DateTimeFormat('en-US', {
        timeZone: timezone, hour: 'numeric', minute: 'numeric',
        second: 'numeric', hour12: false
      }) : null;

      var embedMode = params.get('embed') === 'true';
      var themeParam = params.get('theme');
      var secondsParam = params.get('seconds');
      var borderParam = params.get('border');
      var daynightParam = params.get('daynight');
      var numbersParam = params.get('numbers');
      var showDayNight = daynightParam === 'show' && timezone;

      if (embedMode) {
        document.body.classList.add('embed-mode');
      }
      if (themeParam === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.checked = true;
      } else if (themeParam === 'transparent') {
        document.body.classList.add('transparent-mode');
      }

      if (timezone) {
        document.title = 'clocksimulator.com - ' + timezone;
      }

      function getTime() {
        var now = new Date();
        if (!timezone) {
          return { hours: now.getHours(), minutes: now.getMinutes(),
                   seconds: now.getSeconds(), millis: now.getMilliseconds() };
        }
        var parts = tzFormatter.formatToParts(now);
        var get = function(type) {
          return parseInt(parts.find(function(p) { return p.type === type; }).value);
        };
        return { hours: get('hour'), minutes: get('minute'),
                 seconds: get('second'), millis: now.getMilliseconds() };
      }

      function addTick(degrees, length, width) {
        const angle = (degrees - 90) * Math.PI / 180;
        const x1 = CX + Math.cos(angle) * (R - length);
        const y1 = CY + Math.sin(angle) * (R - length);
        const x2 = CX + Math.cos(angle) * R;
        const y2 = CY + Math.sin(angle) * R;
        const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        tick.setAttribute('x1', x1);
        tick.setAttribute('y1', y1);
        tick.setAttribute('x2', x2);
        tick.setAttribute('y2', y2);
        tick.setAttribute('stroke', 'var(--tick)');
        tick.setAttribute('stroke-width', width);
        tick.setAttribute('stroke-linecap', 'round');
        ticksGroup.appendChild(tick);
      }

      for (let i = 0; i < 60; i++) {
        if (i % 5 === 0) {
          addTick(i * 6, 10, '2');
        } else {
          addTick(i * 6, 5, '1');
        }
      }

      for (let h = 1; h <= 12; h++) {
        const angle = (h * 30 - 90) * Math.PI / 180;
        const x = CX + Math.cos(angle) * (R - 20);
        const y = CY + Math.sin(angle) * (R - 20);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', x);
        text.setAttribute('y', y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('fill', 'var(--number)');
        text.setAttribute('font-size', '12');
        text.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif');
        text.setAttribute('font-weight', '500');
        text.textContent = h;
        numbersGroup.appendChild(text);
      }

      if (numbersParam === 'hide') {
        numbersGroup.style.display = 'none';
      }

      var secondModeTick = true;
      var secondModeToggle = document.getElementById('secondModeToggle');
      secondModeToggle.checked = true;

      if (secondsParam === 'smooth') {
        secondModeTick = false;
        secondModeToggle.checked = false;
      } else if (secondsParam === 'hide') {
        secondHand.style.display = 'none';
      }

      if (borderParam === 'hide') {
        document.querySelector('#clock > circle').setAttribute('stroke', 'none');
      }

      secondModeToggle.addEventListener('change', function () {
        secondModeTick = this.checked;
      });

      function updateClock() {
        const t = getTime();
        const hours = t.hours % 12;
        const minutes = t.minutes;
        const seconds = t.seconds;
        const millis = t.millis;

        let secondAngle;
        if (secondModeTick) {
          secondAngle = seconds * 6;
          if (millis < 100) {
            secondAngle += 0.5 * Math.exp(-millis / 25);
          }
        } else {
          secondAngle = (seconds + millis / 1000) * 6;
        }
        const minuteAngle = (minutes + seconds / 60) * 6;
        const hourAngle = (hours + minutes / 60) * 30;

        hourHand.setAttribute('transform', 'rotate(' + hourAngle + ' 100 100)');
        minuteHand.setAttribute('transform', 'rotate(' + minuteAngle + ' 100 100)');
        secondHand.setAttribute('transform', 'rotate(' + secondAngle + ' 100 100)');

        if (showDayNight) {
          var isDay = t.hours >= 6 && t.hours < 18;
          sunIcon.setAttribute('display', isDay ? 'inline' : 'none');
          moonIcon.setAttribute('display', isDay ? 'none' : 'inline');
        }

        requestAnimationFrame(updateClock);
      }

      requestAnimationFrame(updateClock);

      themeToggle.addEventListener('change', function () {
        document.body.classList.toggle('light-mode', this.checked);
      });

      var toggleWrapper = document.querySelector('.toggle-wrapper');
      var aboutBtn = document.getElementById('aboutBtn');
      var aboutBubble = document.getElementById('aboutBubble');
      var hideTimer;

      var embedOverlay = document.getElementById('embedOverlay');

      function closeAboutBubble() {
        aboutBubble.classList.remove('visible');
      }

      function showToggle() {
        document.body.classList.remove('cursor-hidden');
        toggleWrapper.classList.add('visible');
        clearTimeout(hideTimer);
        if (aboutBubble.classList.contains('visible') || embedOverlay.classList.contains('visible')) return;
        hideTimer = setTimeout(function () {
          toggleWrapper.classList.remove('visible');
          document.body.classList.add('cursor-hidden');
          closeAboutBubble();
        }, 1000);
      }

      aboutBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        aboutBubble.classList.toggle('visible');
        clearTimeout(hideTimer);
        if (aboutBubble.classList.contains('visible')) {
          embedLink.classList.remove('flash');
          void embedLink.offsetWidth;
          embedLink.classList.add('flash');
        }
      });

      document.addEventListener('click', function (e) {
        if (!aboutBubble.contains(e.target) && e.target !== aboutBtn && !aboutBtn.contains(e.target)) {
          closeAboutBubble();
        }
      });

      if (!embedMode) {
        var lastMoveTime = 0;
        document.addEventListener('mousemove', function () {
          var now = Date.now();
          if (now - lastMoveTime < 150) return;
          lastMoveTime = now;
          showToggle();
        });
        document.addEventListener('touchstart', showToggle, { passive: true });
        window.addEventListener('focus', showToggle);
        window.addEventListener('blur', function () {
          clearTimeout(hideTimer);
          toggleWrapper.classList.remove('visible');
          closeAboutBubble();
        });

        var faviconCanvas = document.createElement('canvas');
        faviconCanvas.width = 32;
        faviconCanvas.height = 32;
        var faviconLink = document.getElementById('favicon');

        function updateFavicon() {
          var ctx = faviconCanvas.getContext('2d');
          var size = 32;
          var cx = size / 2;
          var cy = size / 2;
          var r = 14;

          ctx.clearRect(0, 0, size, size);

          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          ctx.lineWidth = 2;
          ctx.strokeStyle = '#333333';
          ctx.stroke();

          var t = getTime();
          var h = t.hours % 12;
          var m = t.minutes;

          var hourAngle = ((h + m / 60) * 30 - 90) * Math.PI / 180;
          var minuteAngle = (m * 6 - 90) * Math.PI / 180;

          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + Math.cos(hourAngle) * 7, cy + Math.sin(hourAngle) * 7);
          ctx.lineWidth = 3;
          ctx.strokeStyle = '#222222';
          ctx.lineCap = 'round';
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + Math.cos(minuteAngle) * 10, cy + Math.sin(minuteAngle) * 10);
          ctx.lineWidth = 2;
          ctx.strokeStyle = '#444444';
          ctx.lineCap = 'round';
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = '#222222';
          ctx.fill();

          faviconLink.href = faviconCanvas.toDataURL('image/png');
        }

        updateFavicon();
        setInterval(updateFavicon, 60000);

        if ('wakeLock' in navigator) {
          var wakeLockSentinel = null;
          var wakeLockEnabled = true;
          var wakeLockToggle = document.getElementById('wakeLockToggle');
          var wakeLockLabel = document.getElementById('wakeLockLabel');

          wakeLockLabel.removeAttribute('hidden');
          wakeLockToggle.checked = true;

          function requestWakeLock() {
            if (!wakeLockEnabled) return;
            navigator.wakeLock.request('screen').then(function (sentinel) {
              wakeLockSentinel = sentinel;
              wakeLockToggle.checked = true;
              sentinel.addEventListener('release', function () {
                wakeLockSentinel = null;
              });
            }).catch(function () {
              if (document.visibilityState === 'visible') {
                wakeLockToggle.checked = false;
                wakeLockEnabled = false;
              }
            });
          }

          requestWakeLock();

          wakeLockToggle.addEventListener('change', function () {
            wakeLockEnabled = this.checked;
            if (wakeLockEnabled) {
              requestWakeLock();
            } else if (wakeLockSentinel) {
              wakeLockSentinel.release();
              wakeLockSentinel = null;
            }
          });

          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible' && wakeLockEnabled) {
              requestWakeLock();
            }
          });
        }

        var container = document.querySelector('.clock-container');
        var burnInStep = 0;
        var burnInRadius = 6;
        var burnInPositions = 8;

        function applyBurnInShift() {
          var angle = (burnInStep % burnInPositions) * (2 * Math.PI / burnInPositions);
          var dx = Math.round(Math.cos(angle) * burnInRadius * 10) / 10;
          var dy = Math.round(Math.sin(angle) * burnInRadius * 10) / 10;
          container.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
          burnInStep++;
        }

        setInterval(applyBurnInShift, 600000);

        var embedLink = document.getElementById('embedLink');
        var embedCloseBtn = document.getElementById('embedCloseBtn');
        var embedTzInput = document.getElementById('embedTz');
        var embedThemeSelect = document.getElementById('embedTheme');
        var embedSecondsSelect = document.getElementById('embedSeconds');
        var embedBorderSelect = document.getElementById('embedBorder');
        var embedShapeSelect = document.getElementById('embedShape');
        var embedDayNightSelect = document.getElementById('embedDayNight');
        var embedNumbersSelect = document.getElementById('embedNumbers');
        var embedWidthInput = document.getElementById('embedWidth');
        var embedHeightInput = document.getElementById('embedHeight');
        var embedPreview = document.getElementById('embedPreview');
        var embedCodeEl = document.getElementById('embedCode');
        var embedCopyBtn = document.getElementById('embedCopyBtn');
        var localBase = window.location.origin + window.location.pathname;
        var prodBase = 'https://clocksimulator.com/';
        var embedDebounceTimer;

        function buildEmbedParams() {
          var p = ['embed=true'];
          var tz = embedTzInput.value.trim();
          if (tz) p.push('tz=' + encodeURIComponent(tz));
          var theme = embedThemeSelect.value;
          if (theme !== 'dark') p.push('theme=' + theme);
          var seconds = embedSecondsSelect.value;
          if (seconds !== 'tick') p.push('seconds=' + seconds);
          var border = embedBorderSelect.value;
          if (border !== 'show') p.push('border=' + border);
          var daynight = embedDayNightSelect.value;
          if (daynight === 'show') p.push('daynight=show');
          var numbers = embedNumbersSelect.value;
          if (numbers === 'hide') p.push('numbers=hide');
          return '?' + p.join('&');
        }

        function updateEmbed() {
          var qs = buildEmbedParams();
          var w = parseInt(embedWidthInput.value) || 200;
          var h = parseInt(embedHeightInput.value) || 200;
          var isRound = embedShapeSelect.value === 'round';
          var radius = isRound ? ' border-radius:50%;' : '';
          embedPreview.src = localBase + qs;
          embedPreview.width = Math.min(w, 120);
          embedPreview.height = Math.min(h, 120);
          embedPreview.style.borderRadius = isRound ? '50%' : '0';
          var transparent = embedThemeSelect.value === 'transparent' ? ' allowtransparency="true"' : '';
          var code = '<iframe src="' + prodBase + qs + '"\n' +
            '  width="' + w + '" height="' + h + '" frameborder="0"' + transparent + '\n' +
            '  style="border:none;' + radius + ' overflow:hidden;">\n' +
            '</iframe>';
          embedCodeEl.value = code;
        }

        function updateEmbedDebounced() {
          clearTimeout(embedDebounceTimer);
          embedDebounceTimer = setTimeout(updateEmbed, 400);
        }

        function openEmbedPanel(e) {
          if (e) e.preventDefault();
          closeAboutBubble();
          clearTimeout(hideTimer);
          embedOverlay.classList.add('visible');
          updateEmbed();
        }

        function closeEmbedPanel() {
          embedOverlay.classList.remove('visible');
          embedPreview.src = 'about:blank';
        }

        embedLink.addEventListener('click', openEmbedPanel);
        embedCloseBtn.addEventListener('click', closeEmbedPanel);
        embedOverlay.addEventListener('click', function (e) {
          if (e.target === embedOverlay) closeEmbedPanel();
        });

        embedTzInput.addEventListener('input', updateEmbedDebounced);
        embedThemeSelect.addEventListener('change', updateEmbed);
        embedSecondsSelect.addEventListener('change', updateEmbed);
        embedBorderSelect.addEventListener('change', updateEmbed);
        embedShapeSelect.addEventListener('change', updateEmbed);
        embedDayNightSelect.addEventListener('change', updateEmbed);
        embedNumbersSelect.addEventListener('change', updateEmbed);
        embedWidthInput.addEventListener('input', updateEmbedDebounced);
        embedHeightInput.addEventListener('input', updateEmbedDebounced);

        embedCopyBtn.addEventListener('click', function () {
          navigator.clipboard.writeText(embedCodeEl.value).then(function () {
            var original = embedCopyBtn.textContent;
            embedCopyBtn.textContent = 'Copied!';
            setTimeout(function () { embedCopyBtn.textContent = original; }, 1500);
          });
        });
      }
    })();
  </script>
</body>
</html>
